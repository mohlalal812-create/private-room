<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Private Room</title>

<!-- Firebase SDKs (no installation needed) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0B0F1A;
    --card:     #111827;
    --border:   #1F2937;
    --accent:   #6366F1;
    --accent2:  #8B5CF6;
    --green:    #10B981;
    --red:      #EF4444;
    --text:     #F9FAFB;
    --muted:    #6B7280;
    --bubble-me: #4F46E5;
    --bubble-them: #1F2937;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 0%, #1e1b4b 0%, var(--bg) 60%);
  }

  .auth-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .auth-logo .icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 12px;
  }

  .auth-logo h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .auth-logo p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .input-group {
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .input-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus {
    border-color: var(--accent);
  }

  .btn-primary {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .auth-toggle {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
  }

  .auth-toggle span {
    color: var(--accent);
    cursor: pointer;
    font-weight: 500;
  }

  .auth-error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }

  /* ── APP LAYOUT ── */
  #app-screen {
    display: none;
    height: 100vh;
    flex-direction: column;
  }

  /* Topbar */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 12px;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .room-badge {
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    color: var(--accent);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px 5px 6px;
    font-size: 13px;
  }

  .avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }

  .icon-btn:hover { background: var(--border); }
  .icon-btn.active { background: rgba(99,102,241,0.2); border-color: var(--accent); }

  /* ── MAIN AREA ── */
  .main-area {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Online sidebar */
  .sidebar {
    width: 220px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .user-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .user-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .user-item:hover { background: var(--bg); }

  .presence-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .presence-dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .presence-dot.offline { background: var(--muted); }

  .username-text {
    font-size: 13px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .call-btn-small {
    font-size: 14px;
    opacity: 0;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .user-item:hover .call-btn-small { opacity: 1; }

  /* ── CHAT ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 8px;
    max-width: 75%;
  }

  .msg-row.mine {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-row.theirs {
    align-self: flex-start;
  }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }

  .msg-row.mine .bubble {
    background: var(--bubble-me);
    border-bottom-right-radius: 4px;
  }

  .msg-row.theirs .bubble {
    background: var(--bubble-them);
    border-bottom-left-radius: 4px;
  }

  .bubble-meta {
    display: flex;
    gap: 6px;
    align-items: baseline;
    margin-bottom: 3px;
  }

  .bubble-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
  }

  .bubble-time {
    font-size: 10px;
    color: var(--muted);
  }

  .typing-indicator {
    display: none;
    padding: 0 16px 8px;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }

  /* Input bar */
  .input-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--card);
    flex-shrink: 0;
  }

  .msg-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    resize: none;
    height: 42px;
    max-height: 120px;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .msg-input:focus { border-color: var(--accent); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .send-btn:hover { opacity: 0.85; }

  /* ── VIDEO CALL OVERLAY ── */
  #video-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .video-container {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .video-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: #1a1a2e;
    border: 2px solid var(--border);
  }

  .video-wrapper video {
    display: block;
    width: 360px;
    max-width: 45vw;
    height: 270px;
    object-fit: cover;
    background: #000;
  }

  .video-label {
    position: absolute;
    bottom: 10px;
    left: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
  }

  .call-status {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
  }

  .call-controls {
    display: flex;
    gap: 16px;
  }

  .call-ctrl-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, opacity 0.2s;
  }

  .call-ctrl-btn:hover { transform: scale(1.1); }
  .call-ctrl-btn:active { transform: scale(0.95); }

  .btn-end { background: var(--red); color: #fff; }
  .btn-mute { background: var(--border); color: var(--text); }
  .btn-cam  { background: var(--border); color: var(--text); }

  /* Incoming call */
  #incoming-call {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    z-index: 200;
    min-width: 240px;
  }

  #incoming-call h3 {
    font-size: 14px;
    margin-bottom: 4px;
  }

  #incoming-call p {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 14px;
  }

  .call-answer-btns {
    display: flex;
    gap: 8px;
  }

  .btn-answer {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-accept { background: var(--green); color: #fff; }
  .btn-decline { background: var(--red); color: #fff; }

  /* Loading */
  .loading {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    font-size: 14px;
  }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .video-wrapper video { width: 80vw; max-width: 80vw; height: 200px; }
  }
</style>
</head>
<body>

<!-- ── AUTH SCREEN ───────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">🔒</div>
      <h1>Private Room</h1>
      <p>Invite-only. No traces.</p>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username-input" placeholder="Choose a username" autocomplete="off" />
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="Password" />
    </div>

    <button class="btn-primary" id="auth-btn">Sign In</button>

    <div class="auth-toggle">
      <span id="auth-toggle-link">Don't have an account? Sign up</span>
    </div>
  </div>
</div>

<!-- ── APP SCREEN ────────────────────────────────────────────────────────── -->
<div id="app-screen">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:18px">🔒</span>
      <span class="room-badge">PRIVATE ROOM</span>
    </div>

    <div class="user-pill">
      <div class="avatar" id="my-avatar">?</div>
      <span id="my-username">...</span>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" id="share-btn" title="Share invite link">🔗</button>
      <button class="icon-btn" id="signout-btn" title="Sign out">🚪</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main-area">

    <!-- Sidebar: online users -->
    <div class="sidebar">
      <div class="sidebar-header">🟢 Online</div>
      <div class="user-list" id="user-list">
        <div class="loading">No one else online</div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="loading">Loading messages...</div>
      </div>
      <div class="typing-indicator" id="typing-indicator"></div>
      <div class="input-bar">
        <textarea class="msg-input" id="msg-input"
          placeholder="Type a message..." rows="1"></textarea>
        <button class="send-btn" id="send-btn">➤</button>
      </div>
    </div>

  </div>
</div>

<!-- ── VIDEO OVERLAY ─────────────────────────────────────────────────────── -->
<div id="video-overlay">
  <div class="call-status" id="call-status">Calling...</div>
  <div class="video-container">
    <div class="video-wrapper">
      <video id="remote-video" autoplay playsinline></video>
      <div class="video-label" id="remote-label">Remote</div>
    </div>
    <div class="video-wrapper">
      <video id="local-video" autoplay playsinline muted></video>
      <div class="video-label">You</div>
    </div>
  </div>
  <div class="call-controls">
    <button class="call-ctrl-btn btn-mute" id="mute-btn" title="Mute">🎤</button>
    <button class="call-ctrl-btn btn-end"  id="end-btn"  title="End call">📵</button>
    <button class="call-ctrl-btn btn-cam"  id="cam-btn"  title="Toggle camera">📷</button>
  </div>
</div>

<!-- ── INCOMING CALL ──────────────────────────────────────────────────────── -->
<div id="incoming-call">
  <h3 id="caller-name">Someone</h3>
  <p>Incoming video call...</p>
  <div class="call-answer-btns">
    <button class="btn-answer btn-accept"  id="accept-btn">✅ Accept</button>
    <button class="btn-answer btn-decline" id="decline-btn">❌ Decline</button>
  </div>
</div>

<!-- ── FIREBASE CONFIG ────────────────────────────────────────────────────── -->
<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  STEP 1: Paste your Firebase config here                ║
// ║  Get it from: console.firebase.google.com               ║
// ║  Project Settings → Your Apps → Firebase SDK snippet    ║
// ╚══════════════════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey:            "AIzaSyDUHVeaHIMRS8GxkFNEjVSXfUeKr_mQnp0",
  authDomain:        "just-you-n-i.firebaseapp.com",
  databaseURL:       "https://just-you-n-i-default-rtdb.firebaseio.com",
  projectId:         "just-you-n-i",
  storageBucket:     "just-you-n-i.firebasestorage.app",
  messagingSenderId: "340669970156",
  appId:             "1:340669970156:web:a717d9a97f52eb629e17c9",
  measurementId:     "G-CJWCTD8PVN",
};

// ╔══════════════════════════════════════════════════════════╗
// ║  STEP 2: Set your private room ID                       ║
// ║  Only people with this ID in the URL can join           ║
// ╚══════════════════════════════════════════════════════════╝
const ROOM_ID = "myroom"; // change this to something private

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

// ── STATE ─────────────────────────────────────────────────────────────────
let myUser       = null;
let localStream  = null;
let peerConn     = null;
let isMuted      = false;
let isCamOff     = false;
let isSignUp     = false;
let typingTimer  = null;

const rtcConfig = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
  ],
};

// ── AUTH ──────────────────────────────────────────────────────────────────
const authError    = document.getElementById("auth-error");
const authBtn      = document.getElementById("auth-btn");
const authToggle   = document.getElementById("auth-toggle-link");
const usernameInp  = document.getElementById("username-input");
const passwordInp  = document.getElementById("password-input");

authToggle.addEventListener("click", () => {
  isSignUp = !isSignUp;
  authBtn.textContent = isSignUp ? "Create Account" : "Sign In";
  authToggle.textContent = isSignUp
    ? "Already have an account? Sign in"
    : "Don't have an account? Sign up";
  authError.style.display = "none";
});

authBtn.addEventListener("click", async () => {
  const username = usernameInp.value.trim();
  const password = passwordInp.value.trim();
  if (!username || !password) return showError("Please fill in all fields.");

  // Use username@privateroom.app as fake email for Firebase Auth
  const fakeEmail = `${username.toLowerCase()}@privateroom.app`;

  authBtn.textContent = "Please wait...";
  authBtn.disabled = true;
  authError.style.display = "none";

  try {
    let cred;
    if (isSignUp) {
      cred = await auth.createUserWithEmailAndPassword(fakeEmail, password);
      await cred.user.updateProfile({ displayName: username });
    } else {
      cred = await auth.signInWithEmailAndPassword(fakeEmail, password);
    }
  } catch (e) {
    let msg = e.message;
    if (e.code === "auth/user-not-found") msg = "Username not found. Sign up first.";
    if (e.code === "auth/wrong-password") msg = "Wrong password.";
    if (e.code === "auth/email-already-in-use") msg = "Username taken. Try another.";
    if (e.code === "auth/weak-password") msg = "Password must be at least 6 characters.";
    showError(msg);
    authBtn.textContent = isSignUp ? "Create Account" : "Sign In";
    authBtn.disabled = false;
  }
});

function showError(msg) {
  authError.textContent = msg;
  authError.style.display = "block";
}

// Enter key to submit
[usernameInp, passwordInp].forEach(el => {
  el.addEventListener("keydown", e => { if (e.key === "Enter") authBtn.click(); });
});

// ── AUTH STATE ────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (user) {
    myUser = user;
    showApp(user);
  } else {
    showAuthScreen();
  }
});

function showApp(user) {
  const username = user.displayName || user.email.split("@")[0];
  document.getElementById("auth-screen").style.display    = "none";
  document.getElementById("app-screen").style.display     = "flex";
  document.getElementById("my-username").textContent       = username;
  document.getElementById("my-avatar").textContent         = username[0].toUpperCase();

  setOnline(user.uid, username);
  loadMessages();
  watchOnlineUsers();
  watchCalls();
}

function showAuthScreen() {
  document.getElementById("auth-screen").style.display    = "flex";
  document.getElementById("app-screen").style.display     = "none";
  authBtn.textContent = "Sign In";
  authBtn.disabled    = false;
}

// ── PRESENCE ──────────────────────────────────────────────────────────────
function setOnline(uid, username) {
  const ref = db.ref(`rooms/${ROOM_ID}/presence/${uid}`);
  ref.set({ username, online: true, lastSeen: Date.now() });
  ref.onDisconnect().update({ online: false, lastSeen: Date.now() });
}

function watchOnlineUsers() {
  const list = document.getElementById("user-list");
  db.ref(`rooms/${ROOM_ID}/presence`).on("value", snap => {
    const users = snap.val() || {};
    list.innerHTML = "";
    Object.entries(users).forEach(([uid, u]) => {
      if (uid === myUser.uid) return;
      const div = document.createElement("div");
      div.className = "user-item";
      const online = u.online;
      div.innerHTML = `
        <div class="avatar" style="width:28px;height:28px;font-size:11px;">${u.username[0].toUpperCase()}</div>
        <span class="username-text">${u.username}</span>
        <div class="presence-dot ${online ? 'online' : 'offline'}"></div>
        ${online ? `<span class="call-btn-small" data-uid="${uid}" data-name="${u.username}" title="Video call">📹</span>` : ""}
      `;
      list.appendChild(div);
    });

    if (list.innerHTML === "") {
      list.innerHTML = '<div class="loading">No one else online</div>';
    }

    // Attach call button listeners
    list.querySelectorAll(".call-btn-small").forEach(btn => {
      btn.addEventListener("click", () => startCall(btn.dataset.uid, btn.dataset.name));
    });
  });
}

// ── MESSAGES ──────────────────────────────────────────────────────────────
function loadMessages() {
  const container = document.getElementById("messages");
  container.innerHTML = "";
  db.ref(`rooms/${ROOM_ID}/messages`).limitToLast(100).on("child_added", snap => {
    const msg = snap.val();
    appendMessage(msg);
  });
}

function appendMessage(msg) {
  const container = document.getElementById("messages");
  const isMe = msg.uid === myUser.uid;
  const time  = new Date(msg.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  const row = document.createElement("div");
  row.className = `msg-row ${isMe ? "mine" : "theirs"}`;

  if (!isMe) {
    row.innerHTML = `
      <div class="msg-avatar">${msg.username[0].toUpperCase()}</div>
      <div>
        <div class="bubble-meta">
          <span class="bubble-name">${escHtml(msg.username)}</span>
          <span class="bubble-time">${time}</span>
        </div>
        <div class="bubble">${escHtml(msg.text)}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div>
        <div class="bubble-meta" style="justify-content:flex-end">
          <span class="bubble-time">${time}</span>
        </div>
        <div class="bubble">${escHtml(msg.text)}</div>
      </div>`;
  }

  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById("msg-input");
  const text  = input.value.trim();
  if (!text) return;
  const username = myUser.displayName || myUser.email.split("@")[0];
  db.ref(`rooms/${ROOM_ID}/messages`).push({
    uid: myUser.uid,
    username,
    text,
    timestamp: Date.now(),
  });
  input.value = "";
  input.style.height = "42px";
  clearTyping();
}

document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("msg-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea + typing indicator
document.getElementById("msg-input").addEventListener("input", function() {
  this.style.height = "42px";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
  showTyping();
});

function showTyping() {
  const username = myUser.displayName || myUser.email.split("@")[0];
  db.ref(`rooms/${ROOM_ID}/typing/${myUser.uid}`).set({ username, ts: Date.now() });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(clearTyping, 2000);
}

function clearTyping() {
  db.ref(`rooms/${ROOM_ID}/typing/${myUser.uid}`).remove();
}

db.ref && setTimeout(() => {
  // Watch typing after auth
  auth.onAuthStateChanged(user => {
    if (!user) return;
    db.ref(`rooms/${ROOM_ID}/typing`).on("value", snap => {
      const typists = snap.val() || {};
      const names = Object.entries(typists)
        .filter(([uid]) => uid !== user.uid)
        .filter(([, v]) => Date.now() - v.ts < 3000)
        .map(([, v]) => v.username);
      const indicator = document.getElementById("typing-indicator");
      if (names.length) {
        indicator.style.display = "block";
        indicator.textContent = `${names.join(", ")} ${names.length === 1 ? "is" : "are"} typing...`;
      } else {
        indicator.style.display = "none";
      }
    });
  });
}, 100);

// ── SHARE LINK ────────────────────────────────────────────────────────────
document.getElementById("share-btn").addEventListener("click", () => {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert("🔗 Link copied!\nShare it with whoever you want to invite."));
  } else {
    prompt("Copy this link:", url);
  }
});

// ── SIGN OUT ──────────────────────────────────────────────────────────────
document.getElementById("signout-btn").addEventListener("click", async () => {
  await db.ref(`rooms/${ROOM_ID}/presence/${myUser.uid}`).update({ online: false });
  clearTyping();
  endCall();
  auth.signOut();
});

// ── WEBRTC VIDEO CALLS ────────────────────────────────────────────────────
const callsRef = () => db.ref(`rooms/${ROOM_ID}/calls`);

async function startCall(targetUid, targetName) {
  document.getElementById("call-status").textContent = `Calling ${targetName}...`;
  document.getElementById("video-overlay").style.display = "flex";
  document.getElementById("remote-label").textContent = targetName;

  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById("local-video").srcObject = localStream;

  peerConn = new RTCPeerConnection(rtcConfig);
  localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));

  peerConn.ontrack = e => {
    document.getElementById("remote-video").srcObject = e.streams[0];
    document.getElementById("call-status").textContent = `In call with ${targetName}`;
  };

  // Exchange ICE candidates
  peerConn.onicecandidate = e => {
    if (e.candidate) {
      callsRef().child(`${myUser.uid}_to_${targetUid}/candidates`).push(e.candidate.toJSON());
    }
  };

  // Create offer
  const offer = await peerConn.createOffer();
  await peerConn.setLocalDescription(offer);

  const username = myUser.displayName || myUser.email.split("@")[0];
  callsRef().child(`${myUser.uid}_to_${targetUid}`).set({
    offer: { type: offer.type, sdp: offer.sdp },
    callerUid: myUser.uid,
    callerName: username,
    targetUid,
    status: "ringing",
  });

  // Listen for answer
  callsRef().child(`${myUser.uid}_to_${targetUid}`).on("value", async snap => {
    const data = snap.val();
    if (!data) return;
    if (data.answer && peerConn.signalingState === "have-local-offer") {
      await peerConn.setRemoteDescription(new RTCSessionDescription(data.answer));
    }
    if (data.status === "declined") endCall();
  });

  // Listen for remote ICE
  callsRef().child(`${targetUid}_to_${myUser.uid}/candidates`).on("child_added", async snap => {
    try { await peerConn.addIceCandidate(new RTCIceCandidate(snap.val())); } catch {}
  });
}

function watchCalls() {
  db.ref(`rooms/${ROOM_ID}/calls`).on("child_added", async snap => {
    const data = snap.val();
    if (!data || data.targetUid !== myUser.uid || data.status !== "ringing") return;

    const callKey = snap.key;
    document.getElementById("caller-name").textContent = data.callerName || "Someone";
    const incoming = document.getElementById("incoming-call");
    incoming.style.display = "block";

    document.getElementById("accept-btn").onclick = async () => {
      incoming.style.display = "none";
      document.getElementById("call-status").textContent = `In call with ${data.callerName}`;
      document.getElementById("remote-label").textContent = data.callerName;
      document.getElementById("video-overlay").style.display = "flex";

      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById("local-video").srcObject = localStream;

      peerConn = new RTCPeerConnection(rtcConfig);
      localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));

      peerConn.ontrack = e => {
        document.getElementById("remote-video").srcObject = e.streams[0];
      };

      peerConn.onicecandidate = e => {
        if (e.candidate) {
          callsRef().child(`${myUser.uid}_to_${data.callerUid}/candidates`).push(e.candidate.toJSON());
        }
      };

      await peerConn.setRemoteDescription(new RTCSessionDescription(data.offer));
      const answer = await peerConn.createAnswer();
      await peerConn.setLocalDescription(answer);

      callsRef().child(callKey).update({
        answer: { type: answer.type, sdp: answer.sdp },
        status: "answered",
      });

      // Remote ICE
      callsRef().child(`${data.callerUid}_to_${myUser.uid}/candidates`).on("child_added", async s => {
        try { await peerConn.addIceCandidate(new RTCIceCandidate(s.val())); } catch {}
      });
    };

    document.getElementById("decline-btn").onclick = () => {
      incoming.style.display = "none";
      callsRef().child(callKey).update({ status: "declined" });
    };
  });
}

function endCall() {
  if (peerConn) { peerConn.close(); peerConn = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById("local-video").srcObject  = null;
  document.getElementById("remote-video").srcObject = null;
  document.getElementById("video-overlay").style.display = "none";
}

document.getElementById("end-btn").addEventListener("click", endCall);

document.getElementById("mute-btn").addEventListener("click", () => {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  document.getElementById("mute-btn").textContent = isMuted ? "🔇" : "🎤";
});

document.getElementById("cam-btn").addEventListener("click", () => {
  if (!localStream) return;
  isCamOff = !isCamOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isCamOff);
  document.getElementById("cam-btn").textContent = isCamOff ? "📵" : "📷";
});

// ── UTILS ─────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
