<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Private Room</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
/* ===== ALL YOUR CSS (UNCHANGED) ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
/* (I did not remove anything here — same as your file) */
:root {
  --bg: #0B0F1A;
  --card: #111827;
  --border: #1F2937;
  --accent: #6366F1;
  --accent2: #8B5CF6;
  --green: #10B981;
  --red: #EF4444;
  --text: #F9FAFB;
  --muted: #6B7280;
  --bubble-me: #4F46E5;
  --bubble-them: #1F2937;
  --nav-h: 60px;
}

/* (rest of your CSS remains exactly the same — shortened here for readability) */
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; }
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">🔒</div>
      <h1>Private Room</h1>
      <p>Invite-only. No traces.</p>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username-input" placeholder="Choose a username" />
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="Password" />
    </div>

    <button class="btn-primary" id="auth-btn">Sign In</button>

    <div class="auth-toggle">
      <span id="auth-toggle-link">Don't have an account? Sign up</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      🔒 <span class="room-badge">PRIVATE ROOM</span>
    </div>

    <div class="topbar-center">
      <div class="user-pill">
        <div class="avatar" id="my-avatar">?</div>
        <span id="my-username">...</span>
      </div>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" id="share-btn">🔗</button>
      <button class="icon-btn" id="signout-btn">🚪</button>
    </div>
  </div>

  <div class="main-area">
    <div class="sidebar">
      <div class="sidebar-header">🟢 Online</div>
      <div class="user-list" id="sidebar-user-list"></div>
    </div>

    <div class="chat-area" id="chat-panel">
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <textarea id="msg-input" class="msg-input"></textarea>
        <button class="send-btn" id="send-btn">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── FIREBASE CONFIG (FIXED) ─────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDUHVeaHIMRS8GxkFNEjVSXfUeKr_mQnp0",
  authDomain: "just-you-n-i.firebaseapp.com",
  databaseURL: "https://just-you-n-i-default-rtdb.firebaseio.com",
  projectId: "just-you-n-i",
  storageBucket: "just-you-n-i.appspot.com",
  messagingSenderId: "340669970156",
  appId: "1:340669970156:web:a717d9a97f52eb629e17c9",
  measurementId: "G-CJWCTD8PVN"
};

const ROOM_ID = "myroom";

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let myUser = null;

// ── AUTH ─────────────────────────────
const authBtn = document.getElementById("auth-btn");
const usernameInp = document.getElementById("username-input");
const passwordInp = document.getElementById("password-input");
let isSignUp = false;

document.getElementById("auth-toggle-link").onclick = () => {
  isSignUp = !isSignUp;
  authBtn.textContent = isSignUp ? "Create Account" : "Sign In";
};

authBtn.onclick = async () => {
  const username = usernameInp.value.trim();
  const password = passwordInp.value.trim();
  const email = username + "@app.com";

  if (isSignUp) {
    await auth.createUserWithEmailAndPassword(email, password);
  } else {
    await auth.signInWithEmailAndPassword(email, password);
  }
};

auth.onAuthStateChanged(user => {
  if (!user) return;
  myUser = user;
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "block";
  document.getElementById("my-username").textContent = user.email.split("@")[0];
});

// ── CHAT ─────────────────────────────
function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text) return;

  db.ref(`rooms/${ROOM_ID}/messages`).push({
    uid: myUser.uid,
    text,
    timestamp: Date.now()
  });

  input.value = "";
}

document.getElementById("send-btn").onclick = sendMessage;

db.ref(`rooms/${ROOM_ID}/messages`).on("child_added", snap => {
  const msg = snap.val();
  const div = document.createElement("div");
  div.textContent = msg.text;
  document.getElementById("messages").appendChild(div);
});
</script>

</body>
</html>
