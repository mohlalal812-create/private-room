<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Private Room</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
/* (Your existing styles remain the same) */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0B0F1A;--card:#111827;--border:#1F2937;
  --accent:#6366F1;--accent2:#8B5CF6;
  --green:#10B981;--red:#EF4444;--orange:#F97316;
  --text:#F9FAFB;--muted:#6B7280;
  --me:#4F46E5;--them:#1F2937;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* ... [All your previous styles remain unchanged] ... */

.bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;position:relative;}
.reply-preview{font-size:12px;opacity:0.75;margin-bottom:6px;padding-left:10px;border-left:3px solid var(--accent);}
.reactions{margin-top:6px;display:flex;gap:8px;font-size:18px;}
.reactions span{cursor:pointer;}

#reply-preview{
  display:none;
  padding:8px 12px;
  background:var(--bg);
  border-top:1px solid var(--border);
  font-size:13px;
  color:var(--muted);
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">🔒</div>
      <h1>Private Room</h1>
      <p>Invite-only. No traces.</p>
    </div>
    <div class="auth-err" id="auth-err"></div>
    <div class="ig"><label>Username</label><input type="text" id="u-inp" placeholder="Choose a username" autocomplete="off"/></div>
    <div class="ig"><label>Password</label><input type="password" id="p-inp" placeholder="Password"/></div>
    <button class="btn-primary" id="auth-btn">Sign In</button>
    <div class="auth-toggle"><span id="auth-tog">Don't have an account? Sign up</span></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left"><span style="font-size:18px">🔒</span></div>
    <div class="topbar-center">
      <div class="user-pill">
        <div class="avatar" id="my-av">?</div>
        <span id="my-uname">...</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="share-btn">🔗</button>
      <button class="icon-btn" id="so-btn">🚪</button>
    </div>
  </div>

  <div class="body-area">
    <div class="conv-list-panel" id="conv-list-panel">
      <div class="conv-list-hdr">💬 Messages</div>
      <div class="conv-list" id="conv-list"></div>
    </div>

    <div class="chat-panel" id="chat-panel">
      <div class="no-chat-selected" id="no-chat-msg">
        <span class="emo">🔒</span>
        <p>Select someone to start chatting</p>
      </div>

      <div id="active-chat" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <div class="chat-header">
          <button class="back-btn" id="back-btn">‹</button>
          <div class="chat-header-av" id="ch-av">?</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="ch-name">...</div>
            <div class="chat-header-status" id="ch-status">Offline</div>
          </div>
          <button class="chat-header-vcall" id="ch-vcall">📹</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing" id="typing"></div>

        <!-- Reply Preview -->
        <div id="reply-preview">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span id="reply-text"></span>
            <button onclick="cancelReply()" style="background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;">✕</button>
          </div>
        </div>

        <div class="input-bar">
          <textarea class="msg-input" id="msg-input" placeholder="Type a message..." rows="1"></textarea>
          <button class="send-btn" id="send-btn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Your existing VIDEO and INCOMING CALL sections remain unchanged -->
<div id="video-overlay">...</div>
<div id="incoming-call">...</div>

<script>
// ====================== CONFIG ======================
const firebaseConfig = {
  apiKey: "AIzaSyDUHVeaHIMRS8GxkFNEjVSXfUeKr_mQnp0",
  authDomain: "just-you-n-i.firebaseapp.com",
  databaseURL: "https://just-you-n-i-default-rtdb.firebaseio.com",
  projectId: "just-you-n-i",
  storageBucket: "just-you-n-i.firebasestorage.app",
  messagingSenderId: "340669970156",
  appId: "1:340669970156:web:a717d9a97f52eb629e17c9",
};

const ROOM_ID = "myroom";
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let myUser = null, localStream = null, peerConn = null;
let isMuted = false, isCamOff = false, isSignUp = false;
let activePeerUid = null, activePeerName = null;
let msgListener = null, typingListener = null;
let allUsers = {};
let replyingTo = null;                    // ← New: For reply feature

const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

function dmKey(a, b) { return [a, b].sort().join('_'); }

// ====================== AUTH ======================
// ... (Your existing auth code remains the same) ...
const authErr = document.getElementById('auth-err');
const authBtn = document.getElementById('auth-btn');

document.getElementById('auth-tog').addEventListener('click', () => {
  isSignUp = !isSignUp;
  authBtn.textContent = isSignUp ? 'Create Account' : 'Sign In';
  document.getElementById('auth-tog').textContent = isSignUp ? 'Already have an account? Sign in' : "Don't have an account? Sign up";
  authErr.style.display = 'none';
});

authBtn.addEventListener('click', async () => {
  const u = document.getElementById('u-inp').value.trim();
  const p = document.getElementById('p-inp').value.trim();
  if (!u || !p) return showErr('Please fill in all fields.');
  const email = `${u.toLowerCase()}@privateroom.app`;
  authBtn.textContent = 'Please wait...'; 
  authBtn.disabled = true;
  try {
    let c;
    if (isSignUp) {
      c = await auth.createUserWithEmailAndPassword(email, p);
      await c.user.updateProfile({ displayName: u });
    } else {
      c = await auth.signInWithEmailAndPassword(email, p);
    }
  } catch (e) {
    let m = e.message;
    if (e.code === 'auth/user-not-found') m = 'Username not found. Sign up first.';
    if (e.code === 'auth/wrong-password') m = 'Wrong password.';
    if (e.code === 'auth/email-already-in-use') m = 'Username taken.';
    if (e.code === 'auth/weak-password') m = 'Password must be at least 6 characters.';
    showErr(m);
  } finally {
    authBtn.textContent = isSignUp ? 'Create Account' : 'Sign In';
    authBtn.disabled = false;
  }
});

function showErr(m) {
  authErr.textContent = m;
  authErr.style.display = 'block';
}

auth.onAuthStateChanged(user => {
  if (user) { myUser = user; showApp(user); } 
  else showAuthScreen();
});

function showApp(user) {
  const uname = user.displayName || user.email.split('@')[0];
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('my-uname').textContent = uname;
  document.getElementById('my-av').textContent = uname[0].toUpperCase();
  setOnline(user.uid, uname);
  watchUsers();
  watchCalls();
}

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

// ====================== PRESENCE & USERS ======================
function setOnline(uid, uname) {
  const r = db.ref(`rooms/\( {ROOM_ID}/presence/ \){uid}`);
  r.set({ username: uname, online: true, lastSeen: Date.now() });
  r.onDisconnect().update({ online: false, lastSeen: Date.now() });
}

function watchUsers() {
  db.ref(`rooms/${ROOM_ID}/presence`).on('value', snap => {
    allUsers = snap.val() || {};
    renderConvList();
    if (activePeerUid && allUsers[activePeerUid]) updateChatHeader(activePeerUid);
  });
}

function renderConvList() {
  const list = document.getElementById('conv-list');
  list.innerHTML = '';
  const others = Object.entries(allUsers).filter(([uid]) => uid !== myUser.uid);
  if (!others.length) {
    list.innerHTML = '<div class="no-contacts"><span class="emo">👥</span><p>No one else is here yet.<br>Share the link!</p></div>';
    return;
  }
  others.sort((a, b) => (b[1].online ? 1 : 0) - (a[1].online ? 1 : 0));
  others.forEach(([uid, u]) => {
    const div = document.createElement('div');
    div.className = `conv-item ${activePeerUid === uid ? 'active' : ''}`;
    div.dataset.uid = uid;
    div.innerHTML = `
      <div class="conv-av">\( {u.username[0].toUpperCase()} \){u.online ? '<div class="conv-online-dot"></div>' : ''}</div>
      <div class="conv-info">
        <div class="conv-name">${esc(u.username)}</div>
        <div class="conv-preview">${u.online ? 'Online' : 'Offline'}</div>
      </div>`;
    div.addEventListener('click', () => openChat(uid, u.username));
    list.appendChild(div);
  });
}

// ====================== CHAT ======================
function openChat(uid, uname) {
  activePeerUid = uid;
  activePeerName = uname;
  replyingTo = null;
  cancelReply();

  document.querySelectorAll('.conv-item').forEach(el => el.classList.toggle('active', el.dataset.uid === uid));
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('no-chat-msg').style.display = 'none';
  document.getElementById('active-chat').style.display = 'flex';

  updateChatHeader(uid);
  loadDM(uid);
  watchTyping(uid);
}

function updateChatHeader(uid) {
  const u = allUsers[uid] || {};
  document.getElementById('ch-av').textContent = (u.username || '?')[0].toUpperCase();
  document.getElementById('ch-name').textContent = u.username || 'Unknown';
  const st = document.getElementById('ch-status');
  st.textContent = u.online ? 'Online' : 'Offline';
  st.className = 'chat-header-status' + (u.online ? ' on' : '');
  document.getElementById('ch-vcall').onclick = () => startCall(uid, u.username);
}

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('chat-panel').classList.remove('open');
  activePeerUid = null;
  if (msgListener) { msgListener(); msgListener = null; }
  if (typingListener) { typingListener(); typingListener = null; }
});

// ====================== MESSAGES + REPLY + REACTIONS ======================
function loadDM(peerUid) {
  const container = document.getElementById('messages');
  container.innerHTML = '';

  if (msgListener) { msgListener(); msgListener = null; }

  const key = dmKey(myUser.uid, peerUid);
  const ref = db.ref(`rooms/\( {ROOM_ID}/dms/ \){key}/messages`);
  
  const handler = ref.limitToLast(100).on('child_added', snap => {
    appendMsg(snap.val(), snap.key);
  });
  msgListener = () => ref.off('child_added', handler);
}

function appendMsg(msg, msgId) {
  const c = document.getElementById('messages');
  const me = msg.senderUid === myUser.uid;
  const t = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const row = document.createElement('div');
  row.className = `msg-row ${me ? 'mine' : 'theirs'}`;
  row.dataset.msgId = msgId;

  let replyHTML = '';
  if (msg.replyTo) {
    replyHTML = `<div class="reply-preview">↩ Replying to: ${esc(msg.replyToText || 'message')}</div>`;
  }

  let reactionsHTML = '';
  if (msg.reactions) {
    reactionsHTML = `<div class="reactions">`;
    Object.entries(msg.reactions).forEach(([emoji, count]) => {
      if (count > 0) reactionsHTML += `<span>\( {emoji}<small> \){count}</small></span>`;
    });
    reactionsHTML += `</div>`;
  }

  row.innerHTML = `
    <div class="bubble">
      ${replyHTML}
      ${esc(msg.text)}
      <div class="btime">${t}</div>
      ${reactionsHTML}
    </div>
  `;

  // Long press for Reply + Reactions
  let pressTimer;
  const startPress = () => pressTimer = setTimeout(() => showMessageMenu(row, msgId, msg.text), 500);
  const cancelPress = () => clearTimeout(pressTimer);

  row.addEventListener('mousedown', startPress);
  row.addEventListener('mouseup', cancelPress);
  row.addEventListener('mouseleave', cancelPress);
  row.addEventListener('touchstart', startPress);
  row.addEventListener('touchend', cancelPress);

  c.appendChild(row);
  c.scrollTop = c.scrollHeight;
}

function showMessageMenu(row, msgId, text) {
  const menu = document.createElement('div');
  menu.style.cssText = `
    position:absolute; background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:8px; z-index:200; box-shadow:0 10px 30px rgba(0,0,0,0.6);
    display:flex; flex-direction:column; gap:4px;
  `;

  menu.innerHTML = `
    <button style="padding:8px 16px;text-align:left;background:none;border:none;color:var(--text);cursor:pointer;border-radius:8px;">Reply</button>
    <button style="padding:8px 16px;text-align:left;background:none;border:none;color:var(--text);cursor:pointer;border-radius:8px;">React</button>
  `;

  menu.children[0].onclick = () => {
    replyToMessage(msgId, text);
    document.body.removeChild(menu);
  };
  menu.children[1].onclick = () => {
    showReactionPicker(row, msgId);
    document.body.removeChild(menu);
  };

  const rect = row.getBoundingClientRect();
  menu.style.top = `${rect.top - 70}px`;
  menu.style.left = `${rect.left + 30}px`;

  document.body.appendChild(menu);

  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!menu.contains(e.target)) {
        document.body.removeChild(menu);
        document.removeEventListener('click', handler);
      }
    });
  }, 10);
}

function showReactionPicker(row, msgId) {
  const picker = document.createElement('div');
  picker.style.cssText = `
    position:absolute; background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:8px; display:flex; gap:8px; z-index:300;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
  `;

  const emojis = ['❤️', '👍', '😂', '😮', '😢', '🔥', '🎉', '👏', '🙌'];
  emojis.forEach(emoji => {
    const btn = document.createElement('button');
    btn.textContent = emoji;
    btn.style.cssText = 'font-size:26px;background:none;border:none;cursor:pointer;padding:4px;';
    btn.onclick = () => {
      addReaction(msgId, emoji);
      document.body.removeChild(picker);
    };
    picker.appendChild(btn);
  });

  const rect = row.getBoundingClientRect();
  picker.style.top = `${rect.top - 60}px`;
  picker.style.left = `${rect.left + 40}px`;

  document.body.appendChild(picker);

  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!picker.contains(e.target)) {
        document.body.removeChild(picker);
        document.removeEventListener('click', handler);
      }
    });
  }, 10);
}

function addReaction(msgId, emoji) {
  if (!activePeerUid) return;
  const key = dmKey(myUser.uid, activePeerUid);
  const ref = db.ref(`rooms/\( {ROOM_ID}/dms/ \){key}/messages/\( {msgId}/reactions/ \){emoji}`);
  ref.transaction(count => (count || 0) + 1);
}

let replyingTo = null;

function replyToMessage(msgId, text) {
  replyingTo = { id: msgId, text: text };
  const preview = document.getElementById('reply-preview');
  document.getElementById('reply-text').textContent = `↩ \( {text.substring(0, 55)} \){text.length > 55 ? '...' : ''}`;
  preview.style.display = 'block';
}

function cancelReply() {
  replyingTo = null;
  document.getElementById('reply-preview').style.display = 'none';
}

// ====================== SEND MESSAGE ======================
function sendMsg() {
  if (!activePeerUid) return;
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;

  const key = dmKey(myUser.uid, activePeerUid);
  const msgData = {
    senderUid: myUser.uid,
    text: text,
    timestamp: Date.now()
  };

  if (replyingTo) {
    msgData.replyTo = replyingTo.id;
    msgData.replyToText = replyingTo.text.substring(0, 60) + (replyingTo.text.length > 60 ? '...' : '');
  }

  db.ref(`rooms/\( {ROOM_ID}/dms/ \){key}/messages`).push(msgData);

  inp.value = '';
  inp.style.height = '42px';
  cancelReply();
  clearTyping();
}

document.getElementById('send-btn').addEventListener('click', sendMsg);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = '42px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  showTyping();
});

// ====================== TYPING & OTHER FEATURES ======================
// (Your existing typing, share, signout, WebRTC code remains the same)
function showTyping() { /* ... existing ... */ }
function clearTyping() { /* ... existing ... */ }
function watchTyping(peerUid) { /* ... existing ... */ }

document.getElementById('share-btn').addEventListener('click', () => {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => alert('Link copied!'));
});

document.getElementById('so-btn').addEventListener('click', async () => {
  await db.ref(`rooms/\( {ROOM_ID}/presence/ \){myUser.uid}`).update({online:false});
  auth.signOut();
});

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ====================== WEBRTC (unchanged) ======================
// ... Paste your existing WebRTC code here (startCall, watchCalls, endCall, etc.) ...

</script>
</body>
</html>
