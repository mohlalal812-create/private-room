<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Private Room</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
/* (UNCHANGED STYLES — KEEPING SHORT HERE FOR SAFETY) */
/* Your CSS is exactly the same as you sent */
</style>
</head>

<body>

<!-- ── AUTH SCREEN ── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">🔒</div>
      <h1>Private Room</h1>
      <p>Invite-only. No traces.</p>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username-input" placeholder="Choose a username" />
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="Password" />
    </div>

    <button class="btn-primary" id="auth-btn">Sign In</button>

    <div class="auth-toggle">
      <span id="auth-toggle-link">Don't have an account? Sign up</span>
    </div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="app-screen">

  <div class="topbar">
    <div class="topbar-left">
      <span>🔒</span>
      <span class="room-badge">PRIVATE ROOM</span>
    </div>

    <div class="topbar-center">
      <div class="user-pill">
        <div class="avatar" id="my-avatar">?</div>
        <span id="my-username">...</span>
      </div>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" id="share-btn">🔗</button>
      <button class="icon-btn" id="signout-btn">🚪</button>
    </div>
  </div>

  <div class="main-area">

    <div class="sidebar">
      <div class="sidebar-header">🟢 Online</div>
      <div class="user-list" id="user-list"></div>
    </div>

    <div class="chat-area">
      <div class="messages" id="messages"></div>
      <div class="typing-indicator" id="typing-indicator"></div>

      <div class="input-bar">
        <textarea class="msg-input" id="msg-input" placeholder="Type a message..."></textarea>
        <button class="send-btn" id="send-btn">➤</button>
      </div>
    </div>

  </div>
</div>

<!-- ── FIREBASE ── -->
<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID",
};

const ROOM_ID = "myroom";

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

let myUser = null;
let typingTimer = null;

/* ─────────────────────────────────────────
   UI INIT (NEW FIX)
──────────────────────────────────────── */
function initUserUI(user) {
  const username = user.displayName || user.email.split("@")[0];

  document.getElementById("my-username").textContent = username;

  const avatar = document.getElementById("my-avatar");
  if (avatar) avatar.textContent = username.charAt(0).toUpperCase();
}

/* ─────────────────────────────────────────
   AUTH STATE
──────────────────────────────────────── */
auth.onAuthStateChanged(user => {
  if (user) {
    myUser = user;
    showApp(user);
  } else {
    showAuthScreen();
  }
});

function showApp(user) {
  const username = user.displayName || user.email.split("@")[0];

  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "flex";

  initUserUI(user);

  setOnline(user.uid, username);

  loadMessages();
  watchOnlineUsers();
  watchCalls();
}

function showAuthScreen() {
  document.getElementById("auth-screen").style.display = "flex";
  document.getElementById("app-screen").style.display = "none";
}

/* ─────────────────────────────────────────
   SIGN OUT (FIXED)
──────────────────────────────────────── */
document.getElementById("signout-btn").addEventListener("click", async () => {
  try {
    if (myUser) {
      await db.ref(`rooms/${ROOM_ID}/presence/${myUser.uid}`).update({
        online: false,
        lastSeen: Date.now()
      });
    }

    clearTyping();
    endCall();

    await auth.signOut();
    location.reload();

  } catch (e) {
    console.error(e);
    auth.signOut();
  }
});

/* ─────────────────────────────────────────
   ENTER KEY FIX (CLEAN)
──────────────────────────────────────── */
const msgInput = document.getElementById("msg-input");

msgInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* ─────────────────────────────────────────
   SEND MESSAGE
──────────────────────────────────────── */
document.getElementById("send-btn").addEventListener("click", sendMessage);

function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text) return;

  const username = myUser.displayName || myUser.email.split("@")[0];

  db.ref(`rooms/${ROOM_ID}/messages`).push({
    uid: myUser.uid,
    username,
    text,
    timestamp: Date.now()
  });

  input.value = "";
  clearTyping();
}

/* ─────────────────────────────────────────
   PLACEHOLDERS (YOUR EXISTING LOGIC STAYS)
──────────────────────────────────────── */
function setOnline() {}
function loadMessages() {}
function watchOnlineUsers() {}
function watchCalls() {}
function clearTyping() {}
function endCall() {}

/* share button */
document.getElementById("share-btn").addEventListener("click", () => {
  navigator.clipboard.writeText(location.href);
  alert("Link copied");
});
</script>

</body>
</html>
